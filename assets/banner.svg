<svg width="1280" height="420" viewBox="0 0 1280 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">wsl-vhd-automount banner</title>
  <desc id="desc">A Windows logon flow mounts a BitLocker-backed VHDX directly into WSL 2.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.52" stop-color="#17324d"/>
      <stop offset="1" stop-color="#0e3b36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <path d="M0 332 C180 292 270 368 428 330 C590 292 706 214 890 244 C1042 268 1132 334 1280 282 L1280 420 L0 420 Z" fill="#0f766e" opacity="0.22"/>
  <path d="M0 360 C154 332 288 386 444 354 C638 314 742 266 910 292 C1056 316 1158 366 1280 334 L1280 420 L0 420 Z" fill="#38bdf8" opacity="0.14"/>

  <g transform="translate(78 66)">
    <rect x="0" y="0" width="568" height="288" rx="22" fill="#020617" opacity="0.70" filter="url(#shadow)"/>
    <rect x="28" y="30" width="512" height="44" rx="10" fill="#111827"/>
    <circle cx="54" cy="52" r="7" fill="#ef4444"/>
    <circle cx="78" cy="52" r="7" fill="#f59e0b"/>
    <circle cx="102" cy="52" r="7" fill="#22c55e"/>
    <text x="32" y="120" fill="#e5f6ff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">wsl-vhd-automount</text>
    <text x="34" y="162" fill="#a7f3d0" font-family="Consolas, monospace" font-size="19">logon -> BitLocker unlock -> WSL mount</text>
    <text x="34" y="206" fill="#cbd5e1" font-family="Consolas, monospace" font-size="17">wsl --mount WSL_Drives.vhdx --vhd --name media-removivel</text>
    <rect x="34" y="230" width="202" height="32" rx="16" fill="url(#accent)"/>
    <text x="56" y="252" fill="#03212d" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">fast logon automount</text>
  </g>

  <g transform="translate(734 72)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="238" rx="26" fill="#f8fafc"/>
    <rect x="42" y="54" width="276" height="118" rx="18" fill="#dbeafe"/>
    <rect x="80" y="86" width="200" height="56" rx="12" fill="#ffffff"/>
    <text x="120" y="121" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">VHDX</text>
    <path d="M180 174 L180 215" stroke="#0f766e" stroke-width="10" stroke-linecap="round"/>
    <path d="M150 205 L180 235 L210 205" fill="none" stroke="#0f766e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(850 308)">
    <rect x="0" y="0" width="292" height="52" rx="26" fill="#020617" opacity="0.74"/>
    <circle cx="36" cy="26" r="12" fill="#34d399"/>
    <text x="62" y="33" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">/mnt/wsl/media-removivel</text>
  </g>
</svg>
